name: Build and Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O apktool.jar

      - name: Build APK
        run: java -jar apktool.jar b . -o AlReaderX-unsigned.apk

      - name: Download uber-apk-signer
        run: |
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

      - name: Restore keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > release.jks

      - name: Sign APK
        run: |
          java -jar uber-apk-signer.jar \
            --apks AlReaderX-unsigned.apk \
            --ks release.jks \
            --ksAlias alreaderx \
            --ksPass "pass:${{ secrets.KEYSTORE_PASS }}" \
            --ksKeyPass "pass:${{ secrets.KEYSTORE_PASS }}" \
            --out signed

      - name: Rename APK
        run: |
          mv signed/AlReaderX-unsigned-aligned-debugSigned.apk AlReaderX.apk 2>/dev/null || \
          mv signed/*.apk AlReaderX.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlReaderX-signed
          path: AlReaderX.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: AlReaderX.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
