name: Build APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -O apktool.jar

      - name: Build APK
        run: java -jar apktool.jar b . -o AlReaderX.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlReaderX
          path: AlReaderX.apk
